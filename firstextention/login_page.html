<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
           background-color: #eef7f6;
           margin:0px;
            height: 400px;
            width:360px;
        }
        .box{
            margin:auto;
            background-color: #C9FFF8;
            height: 90vh;
            width: 60vw;
            border: #c1f3e1de solid 2px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            border-radius: 40px;
            box-shadow:0px 0px 2.5px 2.5px grey;
            

        }
        #repo{
            width:20vw;
        }
        label{
            display: block;
            margin-bottom: 5px;
        }
        #deco{
            letter-spacing: 2px;
        }
        button{
            display: block;
            margin:15px auto ;
            display: block;
            position: relative;
            left: 7px;
            background-color: #2563eb;
            box-shadow:0px 0px 2px 1.5px  #5c8aef;
        }
        button:hover{
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="deco">CodeHub</h1>
        <p>Welcome to Codehub!</p>
        <form action="post" >
            <label for="newrepo">Create new Repository:</label>
            <input type="text" id="newrepo" placeholder="Enter new Repo name"><br>
            <button>Create</button>
               <p>or</p>
            <label for="chosenrepo">Choose From existing Repositories:</label>
            <select name="Choose repo" id="chosenrepo">
                <option value="One">One</option>
                <option value="Two">Two</option>
                <option value="Three">Three</option>
            </select>
            <button>Continue</button>
        </form>
    </div>
</body>
</html>
